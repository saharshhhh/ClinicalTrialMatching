<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Doctor Signup — TrialBridge</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4f46e5",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <header
        class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 lg:px-10 py-4 bg-background-light dark:bg-background-dark">
        <div class="flex items-center gap-4">
            <div class="text-primary size-8 flex items-center justify-center">
                <span class="material-symbols-outlined text-3xl">clinical_notes</span>
            </div>
            <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-[-0.015em]">
                TrialBridge</h2>
        </div>
        <div class="flex items-center gap-4">
            <a class="text-primary text-sm font-semibold flex items-center gap-1 hover:underline" href="/">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                Back to Home
            </a>
            <button
                class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold">
                Help
            </button>
        </div>
    </header>
    <main class="flex-1 flex items-center justify-center p-6 relative overflow-hidden">
        <div
            class="absolute inset-0 pointer-events-none opacity-[0.03] dark:opacity-[0.05] flex items-center justify-center">
            <span class="material-symbols-outlined text-[40rem]">science</span>
        </div>
        <div
            class="w-full max-w-[480px] bg-white dark:bg-slate-900/50 p-8 lg:p-10 rounded-xl shadow-sm border border-primary/10 relative z-10">
            <div class="flex flex-col gap-6">
                <div class="flex flex-col gap-2">
                    <div
                        class="inline-flex self-start items-center gap-2 rounded-full bg-primary/10 px-3 py-1 border border-primary/20">
                        <span class="material-symbols-outlined text-primary text-sm">person_add</span>
                        <p class="text-primary text-xs font-bold uppercase tracking-wider">Research Portal</p>
                    </div>
                    <h1
                        class="text-slate-900 dark:text-slate-100 text-3xl font-black leading-tight tracking-[-0.033em]">
                        Create Account</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-base">Join TrialBridge as a researcher or doctor
                        to manage clinical trials.</p>
                </div>
                <form action="/doctor_signup" method="POST" class="flex flex-col gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Full Name</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
                            <input
                                class="w-full pl-12 pr-4 py-3 rounded-lg border border-primary/20 bg-background-light dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                                name="name" placeholder="Dr. Sarah Johnson" type="text" required />
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Work Email</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                            <input
                                class="w-full pl-12 pr-4 py-3 rounded-lg border border-primary/20 bg-background-light dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                                name="email" placeholder="doctor@hospital.edu" type="email" required />
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Organization /
                            Institution</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">business</span>
                            <input
                                class="w-full pl-12 pr-4 py-3 rounded-lg border border-primary/20 bg-background-light dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                                name="organization" placeholder="e.g. Mayo Clinic" type="text" required />
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Password</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                            <input
                                class="w-full pl-12 pr-4 py-3 rounded-lg border border-primary/20 bg-background-light dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                                name="password" placeholder="••••••••" type="password" required />
                        </div>
                    </div>
                    <button
                        class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-primary/90 transition-colors mt-2 shadow-lg shadow-primary/20"
                        type="submit">
                        Sign Up
                    </button>
                </form>
                <p class="text-center text-slate-500 dark:text-slate-400 text-sm mt-4">
                    Already have an account?
                    <a class="text-primary font-bold hover:underline" href="/doctor_login">Sign In</a>
                </p>
            </div>
        </div>
    </main>
    <footer class="p-6 text-center text-slate-400 dark:text-slate-500 text-xs">
        <p>© 2024 TrialBridge Healthcare Systems. All rights reserved.</p>
    </footer>
</body>

</html>
